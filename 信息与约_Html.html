<!DOCTYPE html>
<html>
    <head>
        <meta charset=UTF-8>
        <title>我是一个标题</title>
        <style>
          [for="nu"]{
            color: red;
          }
        </style>
    </head>
    <body>
      <h2>你想约谁？</h2>
      <form action="相.html">
        <input type="radio" name="1" id="n">
        <label for="n">范梓熙</label>
        <input type="radio" name="1" id="nu">
        <label for="nu">钟梦婷</label><br>
        你想和他/她做什么？
        <br>
        <input type="checkbox">谈谈
        <input type="checkbox">在一起

        地点:

          <option value="食堂">食堂</option>
          <option value="教室">教室</option>

        </select>
        时间:
        <select name="Time">
          <option value="a.m.">
            上午放学
            </option>
          <option value="p.m.">
            下午放学
            </option>
        </select>
        <br>
        <button>确认</button>
        </form>
